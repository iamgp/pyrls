name: Auto Release PR

on:
  push:
    branches: [beta]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: autorelease-rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          cache-on-failure: true

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Inspect release status
        id: status
        run: |
          cargo run --quiet -- status --json > relx-status.json
          python - <<'PY'
          import json
          import os

          with open("relx-status.json", "r", encoding="utf-8") as handle:
              status = json.load(handle)

          next_version = status.get("next_version") or ""
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"next_version={next_version}\n")

          print(f"next_version={next_version or 'none'}")
          PY

      - name: Create or update release PR
        if: steps.status.outputs.next_version != ''
        run: cargo run --quiet -- release pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip when no release is pending
        if: steps.status.outputs.next_version == ''
        run: echo "No releasable version bump detected on beta."
