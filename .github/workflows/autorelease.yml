name: Auto Release PR

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.check.outputs.mode }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build relx from current checkout
        run: cargo build --locked

      - name: Decide release action
        id: check
        run: |
          msg="$(git log -1 --format='%s')"
          if echo "$msg" | grep -qP '^chore\(release\):'; then
            echo "mode=tag" >> "$GITHUB_OUTPUT"
          else
            next_version="$(./target/debug/relx status --json | jq -r '.next_version // empty')"
            if [ -n "$next_version" ]; then
              echo "mode=pr" >> "$GITHUB_OUTPUT"
            else
              echo "mode=noop" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Determine release tag
        id: release_meta
        if: steps.check.outputs.mode == 'tag'
        run: |
          tag_name="v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "relx") | .version')"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.check.outputs.mode == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./target/debug/relx release tag

      - name: Create or update release PR
        if: steps.check.outputs.mode == 'pr'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./target/debug/relx release pr

      - name: No release action required
        if: steps.check.outputs.mode == 'noop'
        run: echo "No releasable version bump detected on main."

  release-assets:
    name: Build and publish release assets
    needs: release-pr
    if: needs.release-pr.outputs.mode == 'tag'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-pr.outputs.tag_name }}
    secrets: inherit
