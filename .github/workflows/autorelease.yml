name: Auto Release PR

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install relx
        uses: iamgp/ReleaseX@v0.4.0
        with:
          command: status
          args: --help > /dev/null

      - name: Check if release commit
        id: check
        run: |
          msg="$(git log -1 --format='%s')"
          if echo "$msg" | grep -qP '^chore\(release\):'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release PR
        if: steps.check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          next_version="$(relx status --json | jq -r '.next_version // empty')"
          if [ -n "$next_version" ]; then
            relx release pr
          else
            echo "No releasable version bump detected on main."
          fi
