name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # musl-tools is required for the musl libc target
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # cross handles cross-compilation toolchains automatically
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Use cross for cross-compilation targets, cargo otherwise
      - name: Build release binary
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      # Rename binary to include the target triple
      - name: Prepare binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pyrls pyrls-${{ matrix.target }}

      - name: Prepare binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/pyrls.exe pyrls-${{ matrix.target }}.exe

      # Create a tarball for unix binaries (matches action.yml expectations)
      - name: Package tarball (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pyrls pyrls
          tar -czf pyrls-${{ matrix.target }}.tar.gz pyrls

      - name: Package zip (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/pyrls.exe pyrls.exe
          7z a pyrls-${{ matrix.target }}.zip pyrls.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyrls-${{ matrix.target }}
          path: |
            pyrls-${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lR artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
